<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;--ivory:#faf7f2;
  --gold:#b8965a;--gold-dark:#8a6e3a;
  --sage:#7a8c72;--sage-dark:#4f6045;
  --text:#4a4a42;--text-light:#8a8a7a;
}
body{background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Jost',sans-serif;padding:2rem 1rem}
.card{background:var(--ivory);max-width:480px;width:100%;position:relative;border:1px solid #ddd5c4;box-shadow:0 6px 40px rgba(90,70,30,.10);overflow:hidden;padding-bottom:3rem;animation:up .7s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* corners */
.corner{position:absolute;width:170px;height:170px;pointer-events:none;z-index:2}
.corner-tl{top:0;left:0}
.corner-tr{top:0;right:0;transform:scaleX(-1)}
.corner-bl{bottom:0;left:0;transform:scaleY(-1)}
.corner-br{bottom:0;right:0;transform:scale(-1,-1)}

/* header */
.header{text-align:center;padding:2.5rem 2rem 1.2rem;position:relative;z-index:1}
.save-label{font-size:9.5px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin-bottom:.5rem}
.names{font-family:'Great Vibes',cursive;font-size:4.2rem;line-height:1.05;color:var(--sage-dark)}
.amp{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.5rem;color:var(--gold);display:block;margin:0}
.tagline{font-size:9.5px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--text-light);margin-top:.9rem}
.date-row{display:flex;align-items:center;justify-content:center;gap:.9rem;margin-top:.5rem;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--text-light)}
.date-row .gem{color:var(--gold);font-size:.45rem}

/* divider */
.div-wrap{display:flex;align-items:center;gap:10px;padding:0 3rem;margin:1.4rem 0}
.div-line{flex:1;height:1px;background:#d5cbbа;background:#d5ccba}
.div-icon{color:var(--sage);line-height:1}

/* form */
.fbody{padding:0 2.5rem;text-align:center;position:relative;z-index:1}
.fq{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;color:var(--text);margin-bottom:1.4rem}
.flabel{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-light);display:block;margin-bottom:.4rem}
input[type=text]{width:100%;border:none;border-bottom:1px solid #cfc6b4;background:transparent;padding:.5rem 0;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--text);text-align:center;outline:none;transition:border-color .3s;margin-bottom:1.8rem}
input[type=text]::placeholder{color:#c5bba8;font-style:italic}
input[type=text]:focus{border-bottom-color:var(--gold)}
.bgroup{display:flex;gap:.75rem;justify-content:center;margin-bottom:2rem}
.btn{font-family:'Jost',sans-serif;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;padding:.8rem 1.8rem;border:1px solid #cfc6b4;background:transparent;color:var(--text-light);cursor:pointer;transition:all .25s;border-radius:1px}
.btn:hover{border-color:var(--sage);color:var(--sage);background:#f0ede5}
.btn.sy{background:var(--sage);color:white;border-color:var(--sage)}
.btn.sn{background:#a09080;color:white;border-color:#a09080}
.sbtn{font-family:'Jost',sans-serif;font-size:9.5px;letter-spacing:.25em;text-transform:uppercase;padding:.9rem 2.8rem;background:var(--gold);color:white;border:none;border-radius:1px;cursor:pointer;transition:opacity .3s,transform .3s,background .2s;opacity:0;pointer-events:none;transform:translateY(5px)}
.sbtn.vis{opacity:1;pointer-events:all;transform:translateY(0)}
.sbtn:hover{background:var(--gold-dark)}

/* ty */
.ty{display:none;text-align:center;padding:0 2.5rem;position:relative;z-index:1}
.ty.show{display:block;animation:up .6s ease}
.ty-title{font-family:'Great Vibes',cursive;font-size:3rem;color:var(--sage-dark);margin-bottom:.7rem}
.ty-msg{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--text-light);line-height:1.9;font-style:italic}
</style>

<!-- Form -->
<div class="fbody" id="formSection">
  <p class="fq">Como podemos chamar você?</p>
  <label class="flabel" for="guestName">Seu nome completo</label>
  <input type="text" id="guestName" placeholder="Digite seu nome" autocomplete="off" oninput="checkForm()">

  <p class="fq">Você poderá estar presente?</p>
  <div class="bgroup">
    <button class="btn" id="btnYes" onclick="sel('yes')">Sim, estarei lá</button>
    <button class="btn" id="btnNo"  onclick="sel('no')">Não poderei ir</button>
  </div>
  <button class="sbtn" id="submitBtn" onclick="go()">Confirmar presença</button>
</div>

    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
      <ellipse cx="26" cy="16" rx="6" ry="9" fill="#f4efe4" opacity=".85"/>

<script>
let ans=null;
function sel(v){
  ans=v;
  document.getElementById('btnYes').className='btn'+(v==='yes'?' sy':'');
  document.getElementById('btnNo').className='btn'+(v==='no'?' sn':'');
  checkForm();
}
function checkForm(){
  const ok=document.getElementById('guestName').value.trim()&&ans;
  document.getElementById('submitBtn').classList.toggle('vis',!!ok);
}
async function go(){
  const name=document.getElementById('guestName').value.trim();
  const btn=document.getElementById('submitBtn');
  btn.textContent='Enviando…';btn.style.opacity='.6';btn.style.pointerEvents='none';
  try{
    const r=await fetch('https://formspree.io/f/mojywzba',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({nome:name,presenca:ans==='yes'?'Confirmado ✓':'Não poderá ir'})
    });
    if(!r.ok)throw 0;
  }catch{
    btn.textContent='Confirmar presença';btn.style.opacity='';btn.style.pointerEvents='';
    alert('Ocorreu um erro. Tente novamente.');return;
  }
  document.getElementById('formSection').style.display='none';
  const ty=document.getElementById('ty');ty.classList.add('show');
  const first=name.split(' ')[0];
  if(ans==='yes'){
    document.getElementById('tyTitle').textContent='Até lá, '+first+'!';
    document.getElementById('tyMsg').innerHTML='Que alegria ter você neste dia tão especial.<br>Sua presença tornará este momento ainda mais bonito.<br><br>Com amor, <em>Naíne & Wallace</em>';
  }else{
    document.getElementById('tyTitle').textContent='Obrigado, '+first+'.';
    document.getElementById('tyMsg').innerHTML='Sentiremos muito a sua falta.<br>Mas saiba que você estará em nossos corações neste dia especial.<br><br>Com carinho, <em>Naíne & Wallace</em>';
  }
}
</script>
